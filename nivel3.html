<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Julia — Nivel 3</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="n3-body">

  <!-- =====================================================
       PANTALLA DE ENTRADA — toque para activar autoplay
       ===================================================== -->
  <div class="n3-entry" id="n3-entry">
    <div class="n3-entry-inner fade-in">
      <p class="n3-entry-label">Nivel 3</p>
      <button class="n3-entry-btn" id="n3-entry-btn">
        <span class="n3-entry-icon">&#9654;</span>
        <span>Reproducir historia</span>
      </button>
    </div>
  </div>

  <!-- =====================================================
       ESCENA PRINCIPAL
       ===================================================== -->
  <div class="n3-scene" id="n3-scene" style="display:none;">

    <!-- Barra de progreso superior — segmentos generados por JS -->
    <div class="n3-progress-bar-wrap" id="n3-progress-wrap"></div>

    <!-- Botón volver -->
    <a href="index.html" class="n3-back-btn">← Menú</a>

    <!-- Contenedor del video 9:16 -->
    <div class="n3-video-wrap" id="n3-video-wrap">

      <!-- Overlay oscuro para legibilidad de mensajes -->
      <div class="n3-video-overlay"></div>

      <!-- ── VIDEO LOCAL ──
           Coloca FEID.mp4 en la misma carpeta que este archivo. -->
      <video
        id="n3-video-local"
        class="n3-video-el"
        src="FEID.mp4"
        muted
        playsinline
        loop
        preload="auto"
      ></video>

      <!-- Mensajes superpuestos — generados por JS -->
      <div class="n3-messages-area" id="n3-messages-area"></div>

    </div><!-- /n3-video-wrap -->

  </div><!-- /n3-scene -->

  <script src="script.js"></script>
</body>
</html>
